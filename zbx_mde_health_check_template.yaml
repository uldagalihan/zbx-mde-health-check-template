    - uuid: b2c3d4e5f6a4478ab1c2d3e4f5a6b7c8
      template: 'Microsoft Defender - Active Devices'
      name: 'Microsoft Defender - Active Devices'
      groups:
        - name: Templates
      items:
        - uuid: c3d4e5f6a7b44c8a9b1c2d3e4f5a6b7c
          name: 'MDE merged JSON (deviceavinfo base + machines health) [MAP BY DNS] (with summary)'
          type: SCRIPT
          key: mde.devices.merged.raw
          delay: 5m
          history: 90d
          value_type: TEXT
          params: |
            function formEncode(obj) {
              var parts = [];
              for (var k in obj) parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(obj[k]));
              return parts.join("&");
            }
            
            function httpJson(method, url, headers, body) {
              var req = new HttpRequest();
              if (headers) for (var h in headers) req.addHeader(h + ": " + headers[h]);
              var resp = (method === "POST") ? req.post(url, body) : req.get(url);
              var code = req.getStatus();
              if (code < 200 || code >= 300) throw "HTTP " + code + " from " + url + " | " + resp;
              return JSON.parse(resp);
            }
            
            function safeStr(v) {
              if (v === null || v === undefined) return "";
              return String(v);
            }
            
            function safeKeyDns(v) {
              var s = safeStr(v).trim();
              if (!s) return "";
              return s.toLowerCase();
            }
            
            // Sadece istediğin 3 healthStatus
            function isWantedHealthStatus(h) {
              var s = safeStr(h).trim();
              return (s === "Active" || s === "NoSensorData" || s === "NoSensorDataImpairedCommunication");
            }
            
            // avModeLabel: Active / EDRBlocked / Other
            function avModeLabelFromCode(v) {
              var s = (v === null || v === undefined) ? "" : String(v);
              if (s === "0") return "Active";
              if (s === "4") return "EDRBlocked";
              return "Other";
            }
            
            // Signature state: True/False/Unknown
            function signatureState(v) {
              var s = safeStr(v).toLowerCase().trim();
              if (s === "true") return "True";
              if (s === "false") return "False";
              return "Unknown";
            }
            
            function pct(part, total) {
              if (!total || total <= 0) return 0;
              return Math.round((part * 10000) / total) / 100; // 2 decimal
            }
            
            var tenant = "{$MDE_TENANT_ID}";
            var clientId = "{$MDE_CLIENT_ID}";
            var clientSecret = "{$MDE_CLIENT_SECRET}";
            var resource = "{$MDE_RESOURCE}";
            var topAv = "{$MDE_TOP_AVINFO}";
            var topM = "{$MDE_TOP_MACHINES}";
            
            if (!tenant || !clientId || !clientSecret) {
              throw "Missing macros: {$MDE_TENANT_ID} / {$MDE_CLIENT_ID} / {$MDE_CLIENT_SECRET}";
            }
            
            // TOKEN
            var tokenUrl = "https://login.microsoftonline.com/" + tenant + "/oauth2/v2.0/token";
            var tokenBody = formEncode({
              grant_type: "client_credentials",
              client_id: clientId,
              client_secret: clientSecret,
              scope: resource + "/.default"
            });
            
            var tokenResp = httpJson("POST", tokenUrl, {"Content-Type":"application/x-www-form-urlencoded"}, tokenBody);
            var token = tokenResp.access_token;
            if (!token) throw "No access_token returned";
            
            var authHeaders = {"Authorization":"Bearer " + token};
            
            // deviceavinfo
            var avUrl = resource + "/api/deviceavinfo?$top=" + encodeURIComponent(topAv) +
              "&$select=machineId,computerDnsName,avMode,avIsSignatureUpToDate,avSignatureUpdateTime,lastSeenTime";
            
            var avData = httpJson("GET", avUrl, authHeaders, null);
            var avArr = avData.value ? avData.value : [];
            
            // avinfo id set
            var avSet = {};
            for (var i = 0; i < avArr.length; i++) {
              var mid = safeStr(avArr[i].machineId);
              if (mid) avSet[mid] = true;
            }
            
            // machines (healthStatus)
            var mUrl = resource + "/api/machines?$top=" + encodeURIComponent(topM) +
              "&$select=id,healthStatus";
            
            var mData = httpJson("GET", mUrl, authHeaders, null);
            var mArr = mData.value ? mData.value : [];
            
            var mMap = {};
            for (var j = 0; j < mArr.length; j++) {
              var id = safeStr(mArr[j].id);
              if (!id) continue;
              if (avSet[id]) mMap[id] = safeStr(mArr[j].healthStatus);
            }
            
            var devices = {};
            
            // counters
            var c_av_active = 0, c_av_block = 0, c_av_other = 0;
            var c_h_active = 0, c_h_nos = 0, c_h_imp = 0;
            var c_s_true = 0, c_s_false = 0, c_s_unk = 0;
            
            for (var k = 0; k < avArr.length; k++) {
              var r = avArr[k];
              var mid2 = safeStr(r.machineId);
              if (!mid2) continue;
            
              var dnsKey = safeKeyDns(r.computerDnsName);
              if (!dnsKey) continue;
            
              var hs = mMap[mid2] ? mMap[mid2] : "";
              if (!isWantedHealthStatus(hs)) continue;
            
              var sigState = signatureState(r.avIsSignatureUpToDate);
              var avLabel = avModeLabelFromCode(r.avMode);
            
              if (avLabel === "Active") c_av_active++;
              else if (avLabel === "EDRBlocked") c_av_block++;
              else c_av_other++;
            
              if (hs === "Active") c_h_active++;
              else if (hs === "NoSensorData") c_h_nos++;
              else if (hs === "NoSensorDataImpairedCommunication") c_h_imp++;
            
              if (sigState === "True") c_s_true++;
              else if (sigState === "False") c_s_false++;
              else c_s_unk++;
            
              devices[dnsKey] = {
                healthStatus: hs,
                signatureState: sigState,
                avModeLabel: avLabel,
                lastSeenTime: safeStr(r.lastSeenTime),
                avSignatureUpdateTime: safeStr(r.avSignatureUpdateTime),
                avIsSignatureUpToDate: safeStr(r.avIsSignatureUpToDate)
              };
            }
            
            var total = 0;
            for (var key in devices) { if (devices.hasOwnProperty(key)) total++; }
            
            var summary = {
              total: total,
              avMode: {
                Active:     { count: c_av_active, pct: pct(c_av_active, total) },
                EDRBlocked: { count: c_av_block,  pct: pct(c_av_block, total) },
                Other:      { count: c_av_other,  pct: pct(c_av_other, total) }
              },
              healthStatus: {
                Active: { count: c_h_active, pct: pct(c_h_active, total) },
                NoSensorData: { count: c_h_nos, pct: pct(c_h_nos, total) },
                NoSensorDataImpairedCommunication: { count: c_h_imp, pct: pct(c_h_imp, total) }
              },
              signatureState: {
                True: { count: c_s_true, pct: pct(c_s_true, total) },
                False: { count: c_s_false, pct: pct(c_s_false, total) },
                Unknown: { count: c_s_unk, pct: pct(c_s_unk, total) }
              }
            };
            
            return JSON.stringify({ summary: summary, devices: devices });
          timeout: 90s
