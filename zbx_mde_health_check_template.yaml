              master_item:
                key: mde.devices.merged.raw
          master_item:
            key: mde.devices.merged.raw
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var res = [];
                  var obj = JSON.parse(value);
                  var devices = obj.devices ? obj.devices : {};
                  for (var dns in devices) {
                    if (!devices.hasOwnProperty(dns)) continue;
                    res.push({"{#DNSNAME}": String(dns)});
                  }
                  return JSON.stringify(res);
